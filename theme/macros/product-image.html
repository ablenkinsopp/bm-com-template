<!--
  templateType: "none"
  isAvailableForNewContent: false
-->
{% macro product_image(url, label, description, color="dark") %}
<div class="self-center flex-1 max-w-[500px] relative rounded-xl">
    <div class="absolute top-0 bottom-0 right-0 left-0 rounded-xl gradient-shadow"></div>
    <div class="flex flex-col relative z-10 rounded-lg overflow-hidden {{ 
        color == "dark" 
        ? "bg-product-image-bg border-product-image-border" 
        : "bg-white border-neutral-50"
    }}">
        <img src="{{ url }}" alt="{{ description }}" />
    </div>
</div>
{% endmacro %}
