{% macro tick_list(ticks) %}
    <ul class="flex flex-col gap-4">
        {% for tick in ticks %}
            <li class="text-white flex items-center gap-2 text-lg">
                <div class="text-darkest-blue w-7 h-7 rounded-2xl flex items-center justify-center text-xl bg-linear-to-r from-light-blue to-turquoise">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 256 256" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"></path></svg>
                </div>
                {{ tick }}
            </li>
        {% endfor %}
    </ul>
{% endmacro %}
